<svg width="500" height="120" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120">
  <defs>
    <!-- 뇌 심볼 그라디언트 -->
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B2CBF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0C0C0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 뇌 모양 심볼 (단순화된 디자인) -->
  <g id="brain-symbol">
    <!-- 뇌 외곽선 -->
    <path d="M 40 40 Q 30 30, 35 20 Q 40 15, 50 20 Q 55 15, 60 20 Q 70 15, 75 25 Q 80 35, 75 45 Q 80 55, 75 65 Q 70 75, 60 70 Q 50 75, 40 70 Q 30 65, 35 55 Q 30 45, 40 40 Z" 
          fill="url(#brainGradient)" opacity="0.9"/>
    
    <!-- 뇌 내부 선 (뉴럴 네트워크 라인) -->
    <path d="M 45 35 Q 50 30, 55 35" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M 48 45 Q 55 45, 62 45" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M 45 55 Q 50 60, 55 55" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.6"/>
    
    <!-- 뇌 노드 (점들) -->
    <circle cx="45" cy="35" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="55" cy="35" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="48" cy="45" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="62" cy="45" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="45" cy="55" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="55" cy="55" r="2.5" fill="#FFFFFF" opacity="0.8"/>
  </g>
  
  <!-- AI 텍스트 (뇌 안에 흰색으로 돋보이게) -->
  <text x="57" y="52" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">AI</text>
  
  <!-- SUPER 텍스트 (로얄 퍼플) -->
  <text x="130" y="70" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#7B2CBF" letter-spacing="2">SUPER</text>
  
  <!-- SKILL 텍스트 (터콰이즈 블루) -->
  <text x="310" y="70" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#40E0D0" letter-spacing="2">SKILL</text>
</svg>
